# Alembic Configuration — Smart Wardrobe AI
# This is a placeholder. Full Alembic setup will be done in Phase 2
# when the PostgreSQL database is connected.

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date
timezone = UTC

# SQLAlchemy URL — will be set from environment variable in Phase 2
sqlalchemy.url = postgresql://user:password@localhost:5432/smart_wardrobe

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
